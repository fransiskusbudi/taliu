services:
  api:
    build: ./backend
    container_name: taliu-api
    ports:
      - "8100:8000"
    env_file:
      - ./backend/.env
    depends_on:
      - qdrant
    restart: unless-stopped
    networks:
      - agent-network

  qdrant:
    image: qdrant/qdrant:latest
    container_name: taliu-qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped
    networks:
      - agent-network

volumes:
  qdrant_data:

networks:
  agent-network:
    driver: bridge
