services:
  api:
    build: ./backend
    container_name: taliu-api
    ports:
      - "8100:8000"
    env_file:
      - ./backend/.env
    depends_on:
      - qdrant
      - postgres
    restart: unless-stopped
    networks:
      - agent-network

  qdrant:
    image: qdrant/qdrant:latest
    container_name: taliu-qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped
    networks:
      - agent-network

  postgres:
    image: postgres:16
    container_name: taliu-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - agent-network

volumes:
  qdrant_data:
  postgres_data:

networks:
  agent-network:
    driver: bridge
